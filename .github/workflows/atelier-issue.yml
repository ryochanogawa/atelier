      # Codex CLI を使う場合:
      #   - uses: ./.github/actions/atelier-action
      #     with:
      #       auto-pr: 'true'
      #       draft: 'true'
      #     env:
      #       ATELIER_MEDIUM: codex
      #
      # Gemini CLI を使う場合:
      #   - uses: ./.github/actions/atelier-action
      #     with:
      #       auto-pr: 'true'
      #       draft: 'true'
      #     env:
      #       ATELIER_MEDIUM: gemini
