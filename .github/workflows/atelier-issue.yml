name: ATELIER Issue Handler
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run:
    if: contains(github.event.comment.body, '@atelier')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/atelier-action
        with:
          auto-pr: 'true'
          draft: 'true'

      # ── 他の Medium を使う場合の例 ──────────────────────
