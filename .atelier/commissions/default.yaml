name: default
description: TypeScript CLI の設計・実装・テスト・レビューを一貫して行う標準ワークフロー

strokes:
  - name: plan
    palette: planner
    knowledge:
      - project-architecture
    contract: plan-output
    instruction: |
      以下の要件定義に基づき、ATELIER CLI プロジェクトの機能設計を行ってください。
      技術スタック: TypeScript, Node.js, ESM, DDD + Hexagonal Architecture
      テスト: Vitest

      以下を明確にしてください:
      - 変更対象のレイヤー（domain / application / adapter / cli / infrastructure）
      - 新規/変更するファイルとその責務
      - 型定義（TypeScript strict mode）
      - 依存方向が正しいか（外→内）
    inputs:
      - requirements
    outputs:
      - implementation_plan
    transitions:
      - condition: default
        next: implement

  - name: implement
    palette: coder
    allow_edit: true
    knowledge:
      - project-architecture
    contract: implementation-output
    instruction: |
      あなたはファイルを直接編集するエージェントです。
      設計に基づき、Edit ツールと Write ツールを使ってプロジェクトのファイルを実際に変更・作成してください。
      テキストで計画や説明を述べるのではなく、必ずツールを使ってコードを書いてください。

      プロジェクトルート: /Users/ogawaryou/Developer/atelier

      規約:
        - TypeScript strict mode, ESM (import/export)
        - Domain Layer は外部ライブラリに依存しない
        - 新規ファイルは既存パターンに従う
        - ビルトイン YAML/MD は src/builtin/ に配置
        - any 禁止、unknown + 型ガード

      重要: 必ず Read でファイルを読み、Edit または Write でファイルを変更してください。
    inputs:
      - implementation_plan
    outputs:
      - implementation
    transitions:
      - condition: default
        next: test

  - name: test
    palette: tester
    knowledge:
      - project-architecture
    contract: test-output
    instruction: |
      実装されたコードのテストを作成・実行してください。

      テストフレームワーク: Vitest
      テスト配置: tests/ ディレクトリ
      規約:
        - AAA パターン (Arrange-Act-Assert)
        - describe でモジュール単位にグループ化
        - vi.mock で外部依存をモック
    inputs:
      - implementation
    outputs:
      - test_results
    transitions:
      - condition: default
        next: review

  - name: review
    palette: reviewer
    knowledge:
      - project-architecture
    contract: review-output
    instruction: |
      実装とテスト結果をレビューしてください。

      観点:
        - TypeScript の型安全性（strict mode 準拠）
        - DDD レイヤー分離（依存方向: 外→内）
        - Port/Adapter パターンの正しい使用
        - エラーハンドリング
        - ビルトインリソースの整合性（builtin/index.ts への登録）
    inputs:
      - implementation
      - test_results
    outputs:
      - review_result
