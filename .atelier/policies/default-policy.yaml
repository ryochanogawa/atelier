name: default-policy
description: ATELIER CLI プロジェクトのコーディング規約

rules:
  - name: typescript
    description: TypeScript 規約
    content: |
      - strict mode 必須
      - any 禁止、unknown + 型ガードを使用
      - ESM (import/export) で統一
      - Branded Types を活用（RunId, CommissionName 等）
      - readonly を積極的に使用

  - name: architecture
    description: アーキテクチャ規約
    content: |
      - Domain Layer は外部ライブラリに依存しない
      - 外部接続は Port（インターフェース）を経由し Adapter が実装
      - ユースケースは Application Layer に配置
      - CLI コマンドは CLI Layer で thin に保つ

  - name: builtin
    description: ビルトインリソース規約
    content: |
      - 新規 palette/policy/knowledge/instruction/contract は src/builtin/ に配置
      - builtin/index.ts の配列に登録必須
      - package.json の copy:builtin スクリプトにディレクトリ追加が必要な場合は追加
      - YAML はパース可能な形式を維持

  - name: naming
    description: 命名規約
    content: |
      - ファイル: kebab-case (例: commission-runner.service.ts)
      - クラス: PascalCase (例: CommissionRunnerService)
      - 関数/変数: camelCase
      - 定数: UPPER_SNAKE_CASE
      - 型/インターフェース: PascalCase
