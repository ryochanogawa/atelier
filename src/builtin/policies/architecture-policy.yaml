name: architecture-policy
description: アーキテクチャ規約。レイヤー分離、依存方向、ファイルサイズ制限。

rules:
  - name: layer-separation
    description: レイヤー分離の原則
    content: |
      ## レイヤー構成
      各レイヤーは明確な責務を持ち、依存方向は上位から下位への一方向とする。

      | レイヤー | 責務 | 例 |
      |----------|------|-----|
      | プレゼンテーション | ユーザーインタラクション、表示 | Controller, View, CLI |
      | アプリケーション | ユースケースの実行、オーケストレーション | Service, UseCase |
      | ドメイン | ビジネスルール、ドメインロジック | Entity, ValueObject |
      | インフラストラクチャ | 外部システム連携、永続化 | Repository, API Client |

      ## 依存方向
      - 上位レイヤー → 下位レイヤー（逆方向は禁止）
      - ドメインレイヤーは他のレイヤーに依存しない
      - インフラストラクチャの詳細はインターフェースで抽象化する

      ## 禁止パターン
      - プレゼンテーション層からの直接 DB アクセス
      - ドメイン層からのフレームワーク固有 API の呼び出し
      - 循環依存（A → B → A）
      - 汎用レイヤーから具体的実装への import と分岐

  - name: dependency-direction
    description: 依存方向の制御
    content: |
      ## 原則
      - データの取得はルート（View/Controller）で行い、下位に渡す
      - 子は親を知らない。イベント/コールバックで通知する
      - 状態の流れは単方向にする

      ## 判定基準
      | 状況 | 判定 |
      |------|------|
      | 下位レイヤーが上位レイヤーを import | REJECT |
      | 具体的実装が汎用レイヤーに漏洩 | REJECT |
      | 循環依存が発生 | REJECT |
      | 依存の逆転を interface で解決 | OK |
      | イベントバスによる疎結合 | OK |

      ## 抽象漏れの検出
      ```typescript
      // 禁止: 汎用レイヤーで具体的実装を import して分岐
      import { uploadToS3 } from '../aws/s3.js'
      if (config.storage === 's3') {
        return uploadToS3(config.bucket, file, options)
      }

      // 推奨: 汎用レイヤーはインターフェースのみ知る
      const storage = createStorage(config)
      return storage.upload(file, options)
      ```

  - name: file-size-limits
    description: ファイルサイズ制限
    content: |
      ## ガイドライン
      | 対象 | 推奨行数 | 上限行数 | 超過時の対応 |
      |------|----------|----------|--------------|
      | ソースファイル | 200行 | 400行 | 責務分割を検討 |
      | テストファイル | 300行 | 500行 | テストヘルパー抽出 |
      | 関数/メソッド | 20行 | 30行 | サブ関数に分割 |
      | クラス | 100行 | 200行 | 責務分割を検討 |

      ## 分割基準
      - 独自の状態を持つ → 分離する
      - UI/ロジックが50行を超える → 分離する
      - 複数の責務を持つ → 分離する
      - ネストが3段階を超える → 早期リターンまたは関数抽出

  - name: module-design
    description: モジュール設計の原則
    content: |
      ## 設計原則
      - 1モジュール1責務（高凝集）
      - モジュール間の結合度を最小化（低結合）
      - 循環依存の禁止

      ## ディレクトリ構造パターン
      | パターン | 適用場面 | 例 |
      |----------|----------|-----|
      | レイヤード | 小規模、CRUD 中心 | controllers/, services/, repositories/ |
      | 垂直スライス | 中〜大規模、機能独立性が高い | features/auth/, features/order/ |
      | ハイブリッド | 共通基盤 + 機能モジュール | core/ + features/ |

      ## 配置の判定基準
      | 状況 | 判定 |
      |------|------|
      | 最適な配置先が明確 | そこに配置 |
      | utils/ や common/ に入れたくなる | 本当に属する機能ディレクトリを検討 |
      | ネストが4段階を超える | 構造を見直す |
      | 既存構造が不適切 | タスクスコープ内でリファクタリングを含める |

  - name: interface-design
    description: インターフェース設計の原則
    content: |
      ## 設計方針
      - 利用者の視点から設計する。内部実装の詳細を露出しない
      - 設定と実行を分離する。「何を使うか」はセットアップ時に決定し、実行 API はシンプルに保つ
      - メソッドの乱立を防ぐ。差異は設定で吸収し、同じことをするメソッドを増やさない

      ## 禁止パターン
      ```typescript
      // 禁止: メソッドの乱立（設定の差異を呼び出し側に押し付ける）
      interface NotificationService {
        sendEmail(to, subject, body)
        sendSMS(to, message)
        sendPush(to, title, body)
      }

      // 推奨: 設定と実行の分離
      interface NotificationService {
        setup(config: ChannelConfig): Channel
      }
      interface Channel {
        send(message: Message): Promise<Result>
      }
      ```

  - name: abstraction-consistency
    description: 抽象化レベルの一貫性
    content: |
      1つの関数内では、操作の粒度を揃える。詳細な操作は別関数に抽出する。
      「何をするか」と「どうやるか」を混在させない。

      ## 禁止例
      ```typescript
      // 禁止: 抽象レベルの混在
      function processOrder(order) {
        validateOrder(order);              // 高レベル
        const conn = pool.getConnection(); // 低レベルの詳細
        conn.query('INSERT...');           // 低レベルの詳細
      }
      ```

      ## 推奨例
      ```typescript
      // 推奨: 抽象レベルの一貫性
      function processOrder(order) {
        validateOrder(order);
        saveOrder(order);  // 詳細は隠蔽
      }
      ```

      ## オーケストレーション関数での注意
      ステップ1 → ステップ2 → ステップ3 の構成では、個別ステップの
      内部が条件分岐で膨らんだら関数に抽出する。基準は分岐の数ではなく、
      「その分岐がその関数の抽象レベルに属するか」。
