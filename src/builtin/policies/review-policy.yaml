name: review-policy
description: レビュー品質基準。重大度判定基準、Approve/Request Changes の判定ルール。

rules:
  - name: review-principles
    description: レビューの基本原則
    content: |
      - 軽微な問題でも先送りしない。今修正できるものは今修正する
      - 曖昧なフィードバックは禁止。ファイル名・行番号・修正案を具体的に示す
      - 推測で指摘しない。実際のコードを確認してから指摘する
      - 理論的な理想ではなく、実装可能な改善案を提示する
      - 変更ファイルに既存の問題があれば、タスク範囲内で修正させる（ボーイスカウトルール）

  - name: scope-determination
    description: 指摘対象のスコープ判定
    content: |
      ## ブロッキング（REJECT 対象）
      - 今回の変更で導入された問題
      - 今回の変更で不要になったコード（引数、import、変数、関数）
      - 変更ファイル内の既存の問題（ボーイスカウトルール適用）
      - 変更モジュール内の構造的問題（スコープ内の場合）

      ## 非ブロッキング（記録のみ）
      - 変更対象外ファイルの問題（情報としてのみ記録）
      - タスクスコープを大幅に超えるリファクタリング（提案として記載）

  - name: reject-criteria
    description: REJECT（Request Changes）の判定基準
    content: |
      以下のいずれかに該当する場合、例外なく REJECT する。

      ## コード品質
      - テストのない新規振る舞い
      - 回帰テストのないバグ修正
      - any 型の使用
      - フォールバック値の濫用（?? 'unknown' など）
      - 説明的コメント（What/How コメント）
      - 未使用コード（「念のため」コード）
      - オブジェクト/配列の直接変更（ミューテーション）
      - 握りつぶされたエラー（空の catch ブロック）
      - Issue と紐づいていない TODO コメント

      ## 構造
      - 本質的に同一ロジックの重複（DRY 違反）
      - 同じことをするメソッドの乱立
      - 汎用レイヤーへの具体的実装の漏洩
      - 公開 API からの内部実装の露出
      - リファクタリング後に残存する置き換え済みコード/エクスポート
      - 関連フィールドの相互バリデーション不足

  - name: warning-criteria
    description: Warning の判定基準
    content: |
      ブロッキングではないが、改善を推奨する。

      - エッジケース/境界値のテスト不足
      - 実装詳細に結合したテスト
      - 過度に複雑な関数/ファイル
      - 不明瞭な命名
      - Issue 番号のない放置された TODO/FIXME
      - 理由なしの @ts-ignore や eslint-disable

  - name: approve-criteria
    description: APPROVE の判定基準
    content: |
      すべての REJECT 基準をクリアし、品質基準を満たした場合に APPROVE する。

      - 条件付き APPROVE は禁止。問題があれば REJECT する
      - 「APPROVE だが以下を改善してほしい」は禁止
      - 1つでも問題があれば REJECT する

  - name: feedback-format
    description: フィードバックの記述形式
    content: |
      すべての指摘には以下を含めること。

      - どのファイルの何行目か
      - 何が問題か
      - どう修正すべきか
      - 抽象化や統合を求める場合、その配置が妥当な理由

      ## 禁止例
      - 「構造を見直してください」
      - 「もう少し整理してください」
      - 「リファクタリングが必要です」

      ## 推奨例
      - 「src/auth/service.ts:45 — validateUser() が3箇所で重複。共通関数に抽出してください。」
      - 「src/api/handler.ts:120 — catch ブロックが空。エラーを上位に伝播するか、ログに記録してください。」

  - name: finding-id-tracking
    description: 指摘の追跡管理
    content: |
      循環的な REJECT を防ぐため、指摘を ID で追跡する。

      - REJECT の各指摘には finding_id を付与する
      - 同じ問題を再度指摘する場合は同じ finding_id を再利用する
      - 繰り返しの指摘には status: persists を設定し、未解決の具体的証拠（ファイル/行）を添える
      - 新規の指摘には status: new を使用する
      - 解決済みの指摘は status: resolved として一覧に含める
      - finding_id のない指摘は無効（REJECT の根拠にできない）
      - REJECT は new または persists の指摘が最低1つある場合のみ可能

  - name: boy-scout-rule
    description: ボーイスカウトルール
    content: |
      変更したコードを見つけた時より良い状態にして残す。

      ## スコープ内
      - 変更ファイル内の既存問題（未使用コード、不適切な命名、壊れた抽象化）
      - 変更モジュール内の構造的問題（責務の混在、不要な依存）

      ## スコープ外
      - 変更対象外のファイル（既存問題の記録のみ）
      - タスクスコープを大幅に超えるリファクタリング（提案として記載、非ブロッキング）

      ## 判定
      | 状況 | 判定 |
      |------|------|
      | 変更ファイルに明らかな問題がある | REJECT — 一緒に修正させる |
      | 冗長な表現（より短い同等表現がある） | REJECT |
      | 不要な分岐/条件（到達不能または常に同じ結果） | REJECT |
      | 数秒〜数分で修正可能 | REJECT（非ブロッキングにしない） |
      | 変更の結果として不要になったコード | REJECT — 変更起因の問題 |
      | 修正に大規模リファクタリングが必要 | 記録のみ（技術的負債） |
