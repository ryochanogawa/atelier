name: test-policy
description: テストポリシー。テスト品質を確保するための規約。

rules:
  - name: test-structure
    description: テスト構造
    content: |
      - AAAパターン（Arrange, Act, Assert）に従う
      - 1つのテストケースは1つの振る舞いを検証する
      - テスト名は「何を」「どの条件で」「どうなるか」を明示する
      - テストファイルは対象ファイルと同じディレクトリ構造に配置する
      - テストヘルパーやフィクスチャは共有ディレクトリにまとめる

  - name: test-coverage
    description: テストカバレッジ
    content: |
      - ステートメントカバレッジ 80% 以上を目標とする
      - ブランチカバレッジ 70% 以上を目標とする
      - クリティカルパスは 100% のカバレッジを目指す
      - カバレッジだけでなくテストの質も重視する

  - name: test-types
    description: テスト種別
    content: |
      - ユニットテスト: 個々の関数・メソッドの動作を検証
      - 結合テスト: モジュール間の連携を検証
      - E2Eテスト: ユーザーフロー全体を検証
      - テストピラミッドを意識する（ユニット > 結合 > E2E）

  - name: test-quality
    description: テスト品質
    content: |
      - テストは独立して実行可能であること
      - テストの実行順序に依存しないこと
      - 外部サービスへの依存はモック化する
      - テストデータは各テストケースで独立して生成する
      - フレイキーテスト（不安定なテスト）は即座に修正する
