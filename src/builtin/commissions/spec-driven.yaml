name: spec-driven
description: 仕様駆動開発（要件→検証→設計→検証→タスク→検証→実装→テスト→レビュー）

strokes:
  - name: requirements
    palette: spec-writer
    instruction: spec-requirements
    contract: spec-requirements-output
    allow_edit: true
    outputs:
      - requirements
    transitions:
      - condition: default
        next: verify-requirements

  - name: verify-requirements
    palette: supervisor
    instruction: verify-requirements
    inputs:
      - requirements
    outputs:
      - requirements_review
    transitions:
      - condition: pass
        next: design
      - condition: warn
        next: design
      - condition: fail
        next: requirements

  - name: design
    palette: spec-writer
    instruction: spec-design
    contract: spec-design-output
    allow_edit: true
    inputs:
      - requirements
    outputs:
      - design
    transitions:
      - condition: default
        next: verify-design

  - name: verify-design
    palette: supervisor
    instruction: verify-design
    inputs:
      - requirements
      - design
    outputs:
      - design_review
    transitions:
      - condition: pass
        next: tasks
      - condition: warn
        next: tasks
      - condition: fail
        next: design

  - name: tasks
    palette: spec-writer
    instruction: spec-tasks
    contract: spec-tasks-output
    allow_edit: true
    inputs:
      - requirements
      - design
    outputs:
      - tasks
    transitions:
      - condition: default
        next: verify-tasks

  - name: verify-tasks
    palette: supervisor
    instruction: verify-tasks
    inputs:
      - requirements
      - design
      - tasks
    outputs:
      - tasks_review
    transitions:
      - condition: pass
        next: implement
      - condition: warn
        next: implement
      - condition: fail
        next: tasks

  - name: implement
    palette: coder
    instruction: implement
    allow_edit: true
    inputs:
      - tasks
      - design
    outputs:
      - implementation
    transitions:
      - condition: default
        next: test

  - name: test
    palette: tester
    instruction: test
    inputs:
      - implementation
    outputs:
      - test_results
    transitions:
      - condition: default
        next: review

  - name: review
    palette: reviewer
    instruction: review
    inputs:
      - implementation
      - test_results
    outputs:
      - review_result
